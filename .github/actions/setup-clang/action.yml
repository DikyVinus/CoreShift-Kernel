name: Setup Clang

description: Download and force LLVM toolchain for GKI

inputs:
  clang_version:
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: gki
      run: |
        set -e

        echo "Selected clang: ${{ inputs.clang_version }}"

        mkdir -p prebuilts/clang/host/linux-x86
        cd prebuilts/clang/host/linux-x86

        case "${{ inputs.clang_version }}" in
          "r536225 (Clang 19)")
            CLANG_VER="clang-r536225"
            CLANG_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.0/LLVM-19.1.0-Linux-X64.tar.xz"
            ;;
          "r547379 (Clang 20)")
            CLANG_VER="clang-r547379"
            CLANG_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.0/LLVM-20.1.0-Linux-X64.tar.xz"
            ;;
          "r584948b (Clang 22)")
            CLANG_VER="clang-r584948b"
            CLANG_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.1/LLVM-22.1.1-Linux-X64.tar.xz"
            ;;
          *)
            echo "Invalid clang version"
            exit 1
            ;;
        esac

        echo "Resolved: $CLANG_VER"

        curl -L --fail -o clang.tar.xz "$CLANG_URL"

        rm -rf "$CLANG_VER"
        mkdir -p "$CLANG_VER"
        tar -xf clang.tar.xz --strip-components=1 -C "$CLANG_VER"
        rm -f clang.tar.xz

        # HARD OVERRIDE: replace ALL prebuilts with selected clang
        for d in clang-*; do
          [ "$d" = "$CLANG_VER" ] && continue
          rm -rf "$d"
          ln -s "$CLANG_VER" "$d"
        done

        echo "Final layout:"
        ls -lah

        echo "Verify clang:"
        "$CLANG_VER/bin/clang" --version
