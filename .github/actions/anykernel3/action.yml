name: AnyKernel3 Packager
description: Package kernel with AK3 + inject feature string

inputs:
  image:
    description: Path to kernel Image
    required: true
  manager:
    description: Root manager
    required: true
  susfs:
    description: Enable SUSFS
    required: false
    default: "no"
  bbg:
    description: Enable BBG
    required: false
    default: "no"
  zip_name:
    description: Output zip name
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e

        IMAGE="${{ inputs.image }}"
        ZIP="${{ inputs.zip_name }}"
        OUT="$GITHUB_WORKSPACE/$ZIP"

        test -f "$IMAGE" || (echo "Image missing"; exit 1)
        test -n "$ZIP" || (echo "ZIP empty"; exit 1)

        FEATURES="${{ inputs.manager }}"
        [ "${{ inputs.susfs }}" = "yes" ] && FEATURES="${FEATURES}-susfs"
        [ "${{ inputs.bbg }}" = "yes" ] && FEATURES="${FEATURES}-bbg"

        rm -rf anykernel

        git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 anykernel

        sed -i "s|kernel.string=.*|kernel.string=CoreShift-${FEATURES}|g" anykernel/anykernel.sh

        cp "$IMAGE" anykernel/Image

        cd anykernel

        zip -r9 "$OUT" . -x "*.git*"

        cd ..

        test -f "$OUT" || (echo "ZIP not created"; exit 1)
