name: AnyKernel3 Packager
description: Package kernel with AK3 + inject feature string

inputs:
  image:
    required: true
  manager:
    required: true
  susfs:
    required: false
    default: "no"
  bbg:
    required: false
    default: "no"
  zip_name:
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e

        IMAGE="${{ inputs.image }}"
        ZIP="${{ inputs.zip_name }}"

        test -f "$IMAGE" || (echo "Image missing"; exit 1)
        [ -n "$ZIP" ] || (echo "ZIP empty"; exit 1)

        FEATURES="${{ inputs.manager }}"
        [ "${{ inputs.susfs }}" = "yes" ] && FEATURES="${FEATURES}-susfs"
        [ "${{ inputs.bbg }}" = "yes" ] && FEATURES="${FEATURES}-bbg"

        rm -rf anykernel outzip
        git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 anykernel
        mkdir -p outzip

        sed -i "s|kernel.string=.*|kernel.string=CoreShift-${FEATURES}|g" anykernel/anykernel.sh

        cp "$IMAGE" anykernel/Image

        cd anykernel

        zip -r9 "../outzip/$ZIP" . -x "*.git*"

        cd ..

        test -f "outzip/$ZIP" || (echo "ZIP not created"; exit 1)

        mv "outzip/$ZIP" "$ZIP"
