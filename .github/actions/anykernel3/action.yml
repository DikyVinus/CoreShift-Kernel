name: AnyKernel3 Packager
description: Package kernel with AK3 + inject feature string

inputs:
  image:
    required: true
  manager:
    required: true
  susfs:
    required: false
    default: "no"
  bbg:
    required: false
    default: "no"
  zip_name:
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e

        IMAGE="${{ inputs.image }}"
        ZIP="${{ inputs.zip_name }}"

        # hard validation (missing in your version)
        test -f "$IMAGE" || (echo "Image missing"; exit 1)
        test -n "$ZIP" || (echo "ZIP empty"; exit 1)

        FEATURES="${{ inputs.manager }}"

        [ "${{ inputs.susfs }}" = "yes" ] && FEATURES="${FEATURES}-susfs"
        [ "${{ inputs.bbg }}" = "yes" ] && FEATURES="${FEATURES}-bbg"

        # clean to avoid reuse issues
        rm -rf anykernel

        git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 anykernel

        sed -i "s|kernel.string=.*|kernel.string=CoreShift-${FEATURES}|g" anykernel/anykernel.sh

        cp "$IMAGE" anykernel/Image

        cd anykernel

        # CRITICAL: write to workspace, not relative parent
        zip -r9 "$GITHUB_WORKSPACE/$ZIP" ./*

        cd ..

        # verify output exists (prevents silent release failure)
        test -f "$GITHUB_WORKSPACE/$ZIP" || (echo "ZIP not created"; exit 1)
