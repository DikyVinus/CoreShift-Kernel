name: Setup BBG
description: Apply Baseband Guard for GKI android12-5.10

runs:
  using: composite
  steps:
    - name: Install BBG
      shell: bash
      working-directory: gki
      run: |
        set -e
        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

    - name: Enable BBG config (deterministic)
      shell: bash
      working-directory: gki/common
      run: |
        set -e

        DEFCONFIG="arch/arm64/configs/gki_defconfig"

        append_if_missing() {
          KEY="$1"
          VALUE="$2"
          grep -q "^$KEY=" "$DEFCONFIG" || echo "$KEY=$VALUE" >> "$DEFCONFIG"
        }

        append_if_missing CONFIG_BBG y

        # build correct LSM chain based on default security
        if grep -q "CONFIG_DEFAULT_SECURITY_SMACK=y" "$DEFCONFIG"; then
          LSM='lockdown,yama,loadpin,safesetid,integrity,smack,selinux,tomoyo,apparmor,bpf,baseband_guard'
        elif grep -q "CONFIG_DEFAULT_SECURITY_APPARMOR=y" "$DEFCONFIG"; then
          LSM='lockdown,yama,loadpin,safesetid,integrity,apparmor,selinux,smack,tomoyo,bpf,baseband_guard'
        elif grep -q "CONFIG_DEFAULT_SECURITY_TOMOYO=y" "$DEFCONFIG"; then
          LSM='lockdown,yama,loadpin,safesetid,integrity,tomoyo,bpf,baseband_guard'
        elif grep -q "CONFIG_DEFAULT_SECURITY_DAC=y" "$DEFCONFIG"; then
          LSM='lockdown,yama,loadpin,safesetid,integrity,bpf,baseband_guard'
        else
          LSM='lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard'
        fi

        # force replace (no append ambiguity)
        if grep -q '^CONFIG_LSM=' "$DEFCONFIG"; then
          sed -i "s|^CONFIG_LSM=.*|CONFIG_LSM=\"$LSM\"|" "$DEFCONFIG"
        else
          echo "CONFIG_LSM=\"$LSM\"" >> "$DEFCONFIG"
        fi

    - name: Export BBG version
      shell: bash
      working-directory: gki/Baseband-guard
      run: |
        set -e
        BBG_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
        echo "BBG_COMMIT=$BBG_COMMIT" >> $GITHUB_ENV
