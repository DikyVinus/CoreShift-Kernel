name: Setup BBG
description: Apply Baseband Guard for GKI android12-5.10

runs:
  using: composite
  steps:
    - name: Install BBG
      shell: bash
      working-directory: gki
      run: |
        set -e
        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

    - name: Enable BBG config
      shell: bash
      working-directory: gki/common
      run: |
        set -e

        DEFCONFIG="arch/arm64/configs/gki_defconfig"

        append_if_missing() {
          KEY="$1"
          VALUE="$2"
          grep -q "^$KEY=" "$DEFCONFIG" || echo "$KEY=$VALUE" >> "$DEFCONFIG"
        }

        append_if_missing CONFIG_BBG y

        if grep -q 'CONFIG_LSM=' "$DEFCONFIG"; then
          sed -i '/CONFIG_LSM=/{
            /baseband_guard/! s/"$/\,baseband_guard"/
          }' "$DEFCONFIG"
        else
          echo 'CONFIG_LSM="landlock,lockdown,yama,integrity,selinux,baseband_guard"' >> "$DEFCONFIG"
        fi

    - name: Verify BBG
      shell: bash
      working-directory: gki
      run: |
        set -e
        grep -r "baseband_guard" common/security || (echo "BBG not applied"; exit 1)

    - name: Export BBG version
      shell: bash
      working-directory: gki/Baseband-guard
      run: |
        set -e
        BBG_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
        echo "BBG_COMMIT=$BBG_COMMIT" >> $GITHUB_ENV      working-directory: ${{ github.workspace }}/gki/Baseband-guard
      run: |
        # Extract and export BBG version info
        BBG_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        echo "BBG_COMMIT=$BBG_COMMIT" >> $GITHUB_ENV
