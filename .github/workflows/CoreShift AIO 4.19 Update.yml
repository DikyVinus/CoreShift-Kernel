name: CoreShift AIO 4.19 Update

on:
  workflow_dispatch:
    inputs:
      device_choice:
        description: 'Select Target Device'
        required: true
        type: choice
        default: 'gale'
        options:
          - 'gale (Redmi 13C/Poco C65)'
          - 'rose (Redmi Note 10S/11SE/Poco M5s)'
      kernel_name:
        description: 'Custom Kernel Name (Leave empty for default)'
        required: false
        default: ''
        type: string
      build_mode:
        description: 'Select Build Mode'
        required: true
        type: choice
        default: 'Single Variant'
        options:
          - 'Single Variant'
          - 'All Variants (KSU, Next, Rissu, ResukiSU, Wild KSU, NonKSU)'
      root_variant:
        description: 'Select Root Variant (Only for Single Mode)'
        required: true
        type: choice
        default: 'KernelSU-Next'
        options:
          - 'KernelSU'
          - 'KernelSU-Next'
          - 'KernelSU-Next (All Managers)'
          - 'Rissu (MamboSU)'
          - 'ResukiSU'
          - 'Wild KSU'
          - 'Non-KSU'
      hook_method:
        description: 'Select Hook Method (Only for Single Mode - KSU Next, Rissu, Wild)'
        required: true
        type: choice
        default: 'susfs'
        options:
          - 'susfs'
          - 'kprobes'
      performance_patch:
        description: 'Select Device SoC for Performance Tuning'
        required: true
        type: choice
        default: 'Snapdragon'
        options:
          - 'Snapdragon'
          - 'MediaTek'
          - 'Universal'
      apply_perf_tweaks:
        description: 'Apply Performance Tweaks (qcom-cpufreq-hw)'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      apply_cam_fix:
        description: 'Apply Camera Fix (Infinix GT 20 Pro)'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      apply_xiaomi_compat_fix:
        description: 'Apply Xiaomi Compat Fix (DRM/Module)'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      apply_susfs_sublevel_fixes:
        description: 'Apply WildKSU SuSFS Sublevel Compilation Fixes'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      clang_version:
        description: 'Select Clang Version'
        required: true
        type: choice
        options:
          - 'r536225 (Clang 19)'
          - 'r547379 (Clang 20)'
          - 'r584948b (Clang 22)'

permissions:
  contents: write

jobs:
  setup-matrix:
    name: Setup Matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.build_mode }}" == "All Variants (KSU, Next, Rissu, ResukiSU, Wild KSU, NonKSU)" ]; then
            echo "🚀 Mode: ALL VARIANTS BUILD (Priority: ResukiSU First)"
            echo 'matrix=[{"variant":"ResukiSU","hook":"susfs"},{"variant":"KernelSU","hook":"susfs"},{"variant":"KernelSU","hook":"kprobes"},{"variant":"KernelSU-Next","hook":"susfs"},{"variant":"KernelSU-Next","hook":"kprobes"},{"variant":"Rissu (MamboSU)","hook":"susfs"},{"variant":"Rissu (MamboSU)","hook":"kprobes"},{"variant":"Wild KSU","hook":"susfs"},{"variant":"Wild KSU","hook":"kprobes"},{"variant":"Non-KSU","hook":"none"}]' >> $GITHUB_OUTPUT
          else
            echo "🚀 Mode: SINGLE VARIANT BUILD"
            echo 'matrix=[{"variant":"${{ github.event.inputs.root_variant }}","hook":"${{ github.event.inputs.hook_method }}"}]' >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.variant }} (${{ matrix.hook }})
    runs-on: ubuntu-22.04
    needs: setup-matrix
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Free disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 12288
          swap-size-mb: 10240
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "titit"
          git config --global user.email "Kingfinik98@gmail.com"

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y git curl repo build-essential bc bison flex libssl-dev \
            libelf-dev python3 python3-pip unzip zip rsync libncurses-dev lld ccache

      - name: Fetch 4.19 Kernel Source
        run: |
          mkdir -p android-kernel
          cd android-kernel
          DEVICE_CHOICE="${{ github.event.inputs.device_choice }}"

          if [[ "$DEVICE_CHOICE" == *"gale"* ]]; then
            echo "🔧 Using Xiaomi Gale Source (Shallow Clone)"
            git clone --depth=1 -b cip https://github.com/Mayuri-Chan/android_kernel_xiaomi_gale.git kernel
          elif [[ "$DEVICE_CHOICE" == *"rose"* ]]; then
            echo "🔧 Using Xiaomi Rose Source (Shallow Clone)"
            git clone --depth=1 -b lineage-23.2 https://github.com/Pietro-Maltose/yuuri_kernel_4.19.git kernel
          fi

          cd kernel
          rm -rf drivers/staging/kernelsu

      - name: Apply Patches
        uses: ./.github/actions/apply-patches
        with:
          performance_patch: "${{ github.event.inputs.performance_patch }}"
          apply_perf_tweaks: "${{ github.event.inputs.apply_perf_tweaks }}"
          apply_cam_fix: "${{ github.event.inputs.apply_cam_fix }}"
          apply_xiaomi_compat_fix: "${{ github.event.inputs.apply_xiaomi_compat_fix }}"
          apply_susfs_sublevel_fixes: "${{ github.event.inputs.apply_susfs_sublevel_fixes }}"
          root_variant: "${{ matrix.variant }}"
          hook_method: "${{ matrix.hook }}"
          device_choice: "${{ github.event.inputs.device_choice }}"
          working_directory: "android-kernel/kernel"


      - name: Set version
        working-directory: android-kernel/kernel
        run: |
          echo "" > scripts/setlocalversion
          chmod +x scripts/setlocalversion

          KERNEL_NAME_INPUT="${{ github.event.inputs.kernel_name }}"
          ROOT_VARIANT="${{ matrix.variant }}"
          HOOK_METHOD="${{ matrix.hook }}"
          PERF="${{ github.event.inputs.performance_patch }}"

          SUFFIX=""
          if [ -n "$KERNEL_NAME_INPUT" ]; then
            SUFFIX="-$KERNEL_NAME_INPUT"
          fi

          if [ "$ROOT_VARIANT" == "KernelSU" ]; then SUFFIX="$SUFFIX-KSU";
          elif [ "$ROOT_VARIANT" == "KernelSU-Next" ]; then SUFFIX="$SUFFIX-Next";
          elif [ "$ROOT_VARIANT" == "KernelSU-Next (All Managers)" ]; then SUFFIX="$SUFFIX-Next-AllMgr";
          elif [ "$ROOT_VARIANT" == "Rissu (MamboSU)" ]; then SUFFIX="$SUFFIX-Rissu";
          elif [ "$ROOT_VARIANT" == "ResukiSU" ]; then SUFFIX="$SUFFIX-ResukiSU";
          elif [ "$ROOT_VARIANT" == "Wild KSU" ]; then SUFFIX="$SUFFIX-Wild";
          elif [ "$ROOT_VARIANT" == "Non-KSU" ]; then SUFFIX="$SUFFIX-NonKSU";
          fi

          if [ "$ROOT_VARIANT" == "KernelSU" ] || [ "$ROOT_VARIANT" == "KernelSU-Next" ] || [ "$ROOT_VARIANT" == "KernelSU-Next (All Managers)" ] || [ "$ROOT_VARIANT" == "Rissu (MamboSU)" ] || [ "$ROOT_VARIANT" == "Wild KSU" ]; then
             if [ "$HOOK_METHOD" = "susfs" ]; then SUFFIX="$SUFFIX-SUS"; fi
          elif [ "$ROOT_VARIANT" == "ResukiSU" ]; then
             SUFFIX="$SUFFIX-SUS"
          fi

          if [ "$PERF" = "Snapdragon" ]; then SUFFIX="$SUFFIX-Qcom";
          elif [ "$PERF" = "MediaTek" ]; then SUFFIX="$SUFFIX-Mtk";
          elif [ "$PERF" = "Universal" ]; then SUFFIX="$SUFFIX-Univ";
          fi

          echo "Setting custom kernel name: $SUFFIX"
          if grep -q '^EXTRAVERSION *=' Makefile; then
            sed -i "s/^EXTRAVERSION *=.*/EXTRAVERSION = $SUFFIX/" Makefile
          else
            echo "EXTRAVERSION = $SUFFIX" >> Makefile
          fi

      - name: Build Kernel
        uses: ./.github/actions/build-kernel
        with:
          clang_version: "${{ github.event.inputs.clang_version }}"
          working_directory_clang: "android-kernel"
          working_directory_build: "android-kernel/kernel"
          is_419: "true"
          build_command: |
            export PATH="$GITHUB_WORKSPACE/android-kernel/prebuilts/clang/host/linux-x86/clang-r563880b/bin:$GITHUB_WORKSPACE/android-kernel/prebuilts/gcc/aarch64-linux-gnu/bin:$GITHUB_WORKSPACE/android-kernel/prebuilts/gcc/arm-linux-gnueabi/bin:$PATH"
            export ARCH=arm64
            export SUBARCH=arm64

            DEVICE_CHOICE="${{ github.event.inputs.device_choice }}"
            if [[ "$DEVICE_CHOICE" == *"gale"* ]]; then
              DEFCONFIG_MAKE="gale_defconfig"
            elif [[ "$DEVICE_CHOICE" == *"rose"* ]]; then
              DEFCONFIG_MAKE="rosemary_defconfig"
            fi

            echo "🔧 Making Defconfig: $DEFCONFIG_MAKE..."
            make O=out $DEFCONFIG_MAKE

            echo "🔨 Compiling Kernel..."
            make O=out CC=clang LLVM=1                  CROSS_COMPILE=aarch64-linux-android-                  CROSS_COMPILE_ARM32=arm-linux-androideabi-                  CROSS_COMPILE_COMPAT=arm-linux-androideabi-                  LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy                  OBJDUMP=llvm-objdump STRIP=llvm-strip                  -j$(nproc --all) Image.gz-dtb

      - name: Setup Environment Variables for Packaging
        id: vars
        run: |
          ROOT_VARIANT="${{ matrix.variant }}"
          BASE_LINUX_VERSION=$(make -s kernelversion -C android-kernel/kernel | tr -d '\n\r')
          echo "BASE_LINUX_VERSION=$BASE_LINUX_VERSION" >> $GITHUB_ENV
          LINUX_VERSION=$(make -s kernelversion -C android-kernel/kernel | tr -d '\n\r')
          echo "LINUX_VERSION=$LINUX_VERSION" >> $GITHUB_ENV

          CUSTOM_KERNEL_NAME="${{ github.event.inputs.kernel_name }}"
          [ -z "$CUSTOM_KERNEL_NAME" ] && KERNEL_NAME="CoreShift" || KERNEL_NAME="$CUSTOM_KERNEL_NAME"
          echo "KERNEL_NAME=$KERNEL_NAME" >> $GITHUB_ENV

          if [ "$ROOT_VARIANT" == "KernelSU" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="KSU-SUS" || VARIANT="KSU-Kprobes"
          elif [ "$ROOT_VARIANT" == "KernelSU-Next" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="Next-SUS" || VARIANT="Next-Kprobes"
          elif [ "$ROOT_VARIANT" == "KernelSU-Next (All Managers)" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="Next-AllMgr-SUS" || VARIANT="Next-AllMgr-Kprobes"
          elif [ "$ROOT_VARIANT" == "Rissu (MamboSU)" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="Rissu-SUS" || VARIANT="Rissu-Kprobes"
          elif [ "$ROOT_VARIANT" == "Wild KSU" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="Wild-SUS" || VARIANT="Wild-Kprobes"
          elif [ "$ROOT_VARIANT" == "ResukiSU" ]; then
             VARIANT="ResukiSU"
          elif [ "$ROOT_VARIANT" == "Non-KSU" ]; then
             VARIANT="NonKSU"
          fi
          echo "VARIANT=$VARIANT" >> $GITHUB_ENV

          BUILD_DATE=$(date +"%Y%m%d")
          RELEASE="v${BUILD_DATE}"
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "AK3_DIR_NAME=AK3-${KERNEL_NAME}-${RELEASE}-${BASE_LINUX_VERSION}-${VARIANT}" >> $GITHUB_ENV
          echo "AK3_ZIP_NAME=AK3-${KERNEL_NAME}-${RELEASE}-${BASE_LINUX_VERSION}-${VARIANT}.zip" >> $GITHUB_ENV
          echo "KBUILD_BUILD_TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S %Z")" >> $GITHUB_ENV
          echo "COMPILER_STRING=${{ github.event.inputs.clang_version }}" >> $GITHUB_ENV

          SUSFS_VER="N/A"
          if [ "${{ matrix.hook }}" == "susfs" ] || [ "$ROOT_VARIANT" == "ResukiSU" ]; then
             SUSFS_VER=$(cat android-kernel/kernel/include/linux/susfs.h | grep -E '^#define SUSFS_VERSION' | cut -d' ' -f3 | sed 's/"//g' || echo "N/A")
          fi
          echo "SUSFS_VERSION=$SUSFS_VER" >> $GITHUB_ENV

      - name: Package Kernel (AnyKernel3)
        run: |
          echo "🚀 Starting kernel packaging process..."
          ANYKERNEL_REPO="https://github.com/DikyVinus/AnyKernel3"
          ANYKERNEL_BRANCH="master"
          KERNEL_IMAGE="$GITHUB_WORKSPACE/android-kernel/kernel/out/arch/arm64/boot/Image.gz-dtb"
          git clone -q --depth=1 $ANYKERNEL_REPO -b $ANYKERNEL_BRANCH anykernel

          KERNEL_STRING="${{ env.LINUX_VERSION }}"
          sed -i "s|kernel.string=.*|kernel.string=$KERNEL_STRING|g" anykernel/anykernel.sh

          cd anykernel
          echo "🗜️ Zipping anykernel..."
          cp "$KERNEL_IMAGE" .
          rm -rf .git
          zip -r9 ${{ env.AK3_ZIP_NAME }} * -x .git README.md *placeholder
          cd ..
          echo "✅ Zip file created: ${{ env.AK3_ZIP_NAME }}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AK3_DIR_NAME }}
          path: |
            anykernel/*
            !anykernel/*.zip

      - name: Send to Telegram (Single Mode)
        if: github.event.inputs.build_mode == 'Single Variant'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "🚀 Sending to Telegram (Single Mode)..."
          ZIP_FILE="anykernel/${{ env.AK3_ZIP_NAME }}"

          ROOT_VARIANT="${{ matrix.variant }}"
          if [ "$ROOT_VARIANT" == "KernelSU" ]; then ROOT_NAME="KernelSU";
          elif [ "$ROOT_VARIANT" == "KernelSU-Next" ]; then ROOT_NAME="KernelSU-Next";
          elif [ "$ROOT_VARIANT" == "KernelSU-Next (All Managers)" ]; then ROOT_NAME="KernelSU-Next (All Managers)";
          elif [ "$ROOT_VARIANT" == "Rissu (MamboSU)" ]; then ROOT_NAME="MamboSU";
          elif [ "$ROOT_VARIANT" == "Wild KSU" ]; then ROOT_NAME="Wild KSU";
          elif [ "$ROOT_VARIANT" == "ResukiSU" ]; then ROOT_NAME="ResukiSU";
          else ROOT_NAME="Stock / No Root"; fi

          CAPTION="🐧 *Linux Version*: ${{ env.LINUX_VERSION }}
          📅 *Build Date*: ${{ env.KBUILD_BUILD_TIMESTAMP }}
          🛡️ *Root Method*: $ROOT_NAME
          SUS: ${{ env.SUSFS_VERSION }}
          🔰 *Compiler*: ${{ env.COMPILER_STRING }}
          ⚙️ *Performance*: ${{ github.event.inputs.performance_patch }}"

          curl -F "chat_id=$TG_CHAT_ID" \
               -F "document=@$ZIP_FILE" \
               -F "caption=$CAPTION" \
               -F "parse_mode=Markdown" \
               https://api.telegram.org/bot$TG_BOT_TOKEN/sendDocument

          echo "✅ Sent to Telegram successfully"
      - name: Cleanup Build Artifacts
        if: always()
        run: |
          echo "🧹 Freeing up disk space for cache compression..."
          rm -rf android-kernel/kernel anykernel

  release-all:
    name: Release All Variants
    needs: build
    if: github.event.inputs.build_mode == 'All Variants (KSU, Next, Rissu, ResukiSU, Wild KSU, NonKSU)'
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Release Variables
        run: |
          DATE_STR=$(date +"%Y%m%d")
          VERSION_SUFFIX=""

          # Try to get version from inputs
          if [ -n "${{ github.event.inputs.kernel_version }}" ]; then
             VERSION_SUFFIX="-${{ github.event.inputs.kernel_version }}"
          elif [ "${{ github.workflow }}" == "CoreShift AIO Master Update" ]; then
             VERSION_SUFFIX="-5.10"
          elif [ "${{ github.workflow }}" == "CoreShift AIO 4.19 Update" ]; then
             VERSION_SUFFIX="-4.19"
          elif [ "${{ github.workflow }}" == "CoreShift AIO VorteXSU" ]; then
             VERSION_SUFFIX="-5.10-VorteXSU"
          fi

          echo "RELEASE_TAG=v${DATE_STR}${VERSION_SUFFIX}" >> $GITHUB_ENV
          echo "RELEASE_DATE=$(date +"%Y-%m-%d %H:%M:%S %Z")" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Artifacts for Release
        run: |
          cd artifacts
          for dir in */; do
            if [ -d "$dir" ]; then
              echo "🗜️ Zipping ${dir}..."
              cd "$dir"
              zip -r9 "../${dir%/}.zip" ./*
              cd ..
              rm -rf "$dir"
            fi
          done
          cd ..

      - name: Send to Telegram (All Variants)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "🚀 Sending All Variants to Telegram..."

          KERNEL_NAME="${{ github.event.inputs.kernel_name }}"
          [ -z "$KERNEL_NAME" ] && KERNEL_NAME="CoreShift"
          PERF_TUNE="${{ github.event.inputs.performance_patch }}"

          CAPTION="🐧 *CoreShift All-in-One Release*
          📅 *Build Date*: $(date +"%Y-%m-%d %H:%M:%S %Z")
          🛡️ *Variants*: ResukiSU, KernelSU-Next, Rissu, Wild KSU, Non-KSU
          ⚙️ *Performance Tuning*: $PERF_TUNE
          🔰 *Compiler*: ${{ github.event.inputs.clang_version }}"

          for file in artifacts/*.zip; do
            if [ -f "$file" ]; then
              echo "📤 Uploading $(basename $file)..."
              curl -F "chat_id=$TG_CHAT_ID" \
                   -F "document=@$file" \
                   -F "caption=$CAPTION" \
                   -F "parse_mode=Markdown" \
                   https://api.telegram.org/bot$TG_BOT_TOKEN/sendDocument
              echo "✅ Uploaded $(basename $file)"
            fi
          done

          echo "✅ All variants sent successfully"
      - name: Cleanup Build Artifacts
        if: always()
        run: |
          echo "🧹 Freeing up disk space for cache compression..."
          rm -rf artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CoreShift Release ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*.zip
          body: |
            🐧 **CoreShift All-in-One Release**
            📅 **Build Date**: ${{ env.RELEASE_DATE }}
            🛡️ **Variants Included**: ResukiSU, KernelSU-Next, Rissu, Wild KSU, Non-KSU
            ⚙️ **Performance Tuning**: ${{ github.event.inputs.performance_patch }}
            🔰 **Compiler**: ${{ github.event.inputs.clang_version || 'Hermetic Bazel Clang' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
