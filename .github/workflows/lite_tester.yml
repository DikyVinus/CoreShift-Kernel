name: Lite Tester (Direct Kernel + AnyKernel3)

on:
  workflow_dispatch:
    inputs:
      manager:
        required: true
        type: choice
        default: "ksun"
        options:
          - "ksu"
          - "ksun"
          - "kowsu"
          - "resukisu"
          - "vanilla"
      susfs:
        required: true
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      bbg:
        required: true
        type: choice
        default: "yes"
        options:
          - "yes"
          - "no"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare kernel tree (no GKI sync)
        run: |
          set -e
          mkdir -p gki
          git clone --depth=1 --branch chihiro-rebase \
            https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git \
            gki/common

      - name: Setup Manager
        uses: ./.github/actions/setup-manager
        with:
          root_type: ${{ github.event.inputs.manager }}

      - name: Setup SUSFS
        if: ${{ github.event.inputs.susfs == 'yes' }}
        uses: ./.github/actions/setup-susfs

      - name: Setup BBG
        if: ${{ github.event.inputs.bbg == 'yes' }}
        uses: ./.github/actions/setup-bbg

      - name: Create stub kernel image
        run: |
          set -e
          mkdir -p gki/out/android12-5.10/dist
          echo "CoreShift stub kernel" > gki/out/android12-5.10/dist/Image

      - name: Prepare naming (identical logic)
        run: |
          set -e

          DATE=$(date +%m%d)
          NAME="CoreShift-${{ github.event.inputs.manager }}"

          if [ "${{ github.event.inputs.susfs }}" = "yes" ]; then
            NAME="${NAME}-SUS"
          fi

          if [ "${{ github.event.inputs.bbg }}" = "yes" ]; then
            NAME="${NAME}-BBG"
          fi

          FINAL_NAME="${NAME}-${DATE}"
          ZIP="${FINAL_NAME}.zip"

          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
          echo "ZIP=$ZIP" >> $GITHUB_ENV

      - name: Package (AnyKernel3) [canonical]
        uses: ./.github/actions/anykernel3
        with:
          image: gki/out/android12-5.10/dist/Image
          manager: ${{ github.event.inputs.manager }}
          susfs: ${{ github.event.inputs.susfs }}
          bbg: ${{ github.event.inputs.bbg }}
          zip_name: ${{ env.ZIP }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_NAME }}
          path: ${{ env.ZIP }}
