name: Lite Tester (Direct Kernel + AnyKernel3)

on:
  workflow_dispatch:
    inputs:
      manager:
        required: true
        type: choice
        default: "ksun"
        options:
          - "ksu"
          - "ksun"
          - "kowsu"
          - "resukisu"
          - "vanilla"
      susfs:
        required: true
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      bbg:
        required: true
        type: choice
        default: "yes"
        options:
          - "yes"
          - "no"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare kernel tree (no GKI sync)
        run: |
          set -e
          mkdir -p gki
          git clone --depth=1 --branch chihiro-rebase \
            https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git \
            gki/common

      - name: Setup Manager
        uses: ./.github/actions/setup-manager
        with:
          root_type: ${{ github.event.inputs.manager }}

      - name: Setup SUSFS
        if: ${{ github.event.inputs.susfs == 'yes' }}
        uses: ./.github/actions/setup-susfs

      - name: Setup BBG
        if: ${{ github.event.inputs.bbg == 'yes' }}
        uses: ./.github/actions/setup-bbg

      - name: Create stub kernel image
        run: |
          set -e
          mkdir -p gki/out/android12-5.10/dist
          echo "CoreShift stub kernel" > gki/out/android12-5.10/dist/Image

      - name: Prepare naming
        run: |
          set -e

          DATE=$(date +%m%d)
          NAME="CoreShift-${{ github.event.inputs.manager }}"

          [ "${{ github.event.inputs.susfs }}" = "yes" ] && NAME="${NAME}-SUS"
          [ "${{ github.event.inputs.bbg }}" = "yes" ] && NAME="${NAME}-BBG"

          FINAL_NAME="${NAME}-${DATE}"
          ZIP="${FINAL_NAME}.zip"

          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
          echo "ZIP=$ZIP" >> $GITHUB_ENV

      - name: Package (AnyKernel3)
        run: |
          set -e

          IMAGE="gki/out/android12-5.10/dist/Image"
          ZIP="${{ env.ZIP }}"

          test -f "$IMAGE" || exit 1

          rm -rf anykernel
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 anykernel

          cp "$IMAGE" anykernel/Image

          sed -i "s|kernel.string=.*|kernel.string=${{ env.FINAL_NAME }}|g" anykernel/anykernel.sh

          cd anykernel
          zip -r9 "../$ZIP" .
          cd ..

          test -f "$ZIP" || exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_NAME }}
          path: ${{ env.ZIP }}
