name: Lite Tester (All Managers Single Clone)

on:
  workflow_dispatch:
    inputs:
      susfs:
        required: true
        type: choice
        default: "no"
        options: ["yes", "no"]
      bbg:
        required: true
        type: choice
        default: "yes"
        options: ["yes", "no"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone kernel once
        run: |
          set -e
          mkdir -p gki
          git clone --depth=1 --branch chihiro-rebase \
            https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git \
            gki/common

      - name: Save clean state
        working-directory: gki/common
        run: |
          set -e
          git add .
          git commit -m "clean" || true

      - name: Run all managers
        run: |
          set -e

          for manager in ksu ksun kowsu resukisu vanilla; do
            echo "===== TEST: $manager ====="

            cd gki/common
            git reset --hard
            git clean -fdx
            cd -

            # manager
            ROOT="$manager"
            echo "Applying $ROOT"
            bash .github/actions/setup-manager/action.yml >/dev/null 2>&1 || true
          done

      - name: Apply SUSFS + BBG per run
        run: |
          set -e

          for manager in ksu ksun kowsu resukisu vanilla; do
            echo "===== PATCH STACK: $manager ====="

            cd gki/common
            git reset --hard
            git clean -fdx
            cd -

            # manager
            ROOT="$manager"
            ./.github/actions/setup-manager/run.sh "$ROOT" || true

            if [ "${{ github.event.inputs.susfs }}" = "yes" ]; then
              ./.github/actions/setup-susfs/run.sh || true
            fi

            if [ "${{ github.event.inputs.bbg }}" = "yes" ]; then
              ./.github/actions/setup-bbg/run.sh || true
            fi
          done
