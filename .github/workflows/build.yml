name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      clang_version:
        description: Clang version
        required: true
        type: choice
        default: "r584948b (Clang 22)"
        options:
          - "r536225 (Clang 19)"
          - "r547379 (Clang 20)"
          - "r584948b (Clang 22)"
      manager:
        description: Root manager
        required: true
        type: choice
        default: "ksun"
        options:
          - "ksu"
          - "ksun"
          - "kowsu"
          - "resukisu"
          - "vanilla"
      susfs:
        description: Enable SUSFS
        required: true
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:
      - uses: actions/checkout@v4

      - name: System setup
        run: |
          set -e
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          git config --global http.version HTTP/1.1

          sudo apt-get update -y
          sudo apt-get install -y \
            git curl repo build-essential bc bison flex libssl-dev \
            libelf-dev python3 unzip zip rsync libncurses-dev lld \
            xz-utils zstd pahole

      - name: Sync GKI
        run: |
          set -e
          mkdir gki && cd gki

          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10 \
            --depth=1

          repo sync -c --no-tags --no-clone-bundle --optimized-fetch -j$(nproc)

      - name: Replace kernel
        run: |
          set -e
          cd gki

          rm -rf common
          git clone --depth=1 --branch chihiro-rebase \
            https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git common

      - name: Setup Clang
        uses: ./.github/actions/setup-clang
        with:
          clang_version: ${{ github.event.inputs.clang_version }}

      - name: Setup Manager
        uses: ./.github/actions/setup-manager
        with:
          root_type: ${{ github.event.inputs.manager }}

      - name: Setup SUSFS
        if: ${{ github.event.inputs.susfs == 'yes' }}
        uses: ./.github/actions/setup-susfs

      - name: Build
        working-directory: gki
        run: |
          set -e
          chmod +x build/build.sh

          LTO=thin \
          BUILD_CONFIG=common/build.config.gki.aarch64 \
          build/build.sh

      - name: Package
        run: |
          set -e

          IMAGE=gki/out/android12-5.10/dist/Image
          VERSION=$(make -s kernelversion -C gki/common)
          DATE=$(date +%Y%m%d)
          ZIP=kernel-${VERSION}-${DATE}-${{ github.event.inputs.manager }}-${{ github.event.inputs.susfs }}.zip

          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 anykernel
          cp "$IMAGE" anykernel/

          cd anykernel
          zip -r9 "../$ZIP" ./*
          cd ..

          echo "ZIP=$ZIP" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ${{ env.ZIP }}
