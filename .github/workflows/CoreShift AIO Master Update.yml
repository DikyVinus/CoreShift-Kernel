name: CoreShift AIO Master Update

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: 'Custom Kernel Name (Leave empty for default)'
        required: false
        default: ''
        type: string
      kernel_source:
        description: 'Select Kernel Source Sync'
        required: true
        type: choice
        default: 'Rama'
        options:
          - 'Rama'
          - 'MillenniumOSS'
      build_mode:
        description: 'Select Build Mode'
        required: true
        type: choice
        default: 'Single Variant'
        options:
          - 'Single Variant'
          - 'All Variants (KSU, Next, Rissu, ResukiSU, Wild KSU, NonKSU)'
      root_variant:
        description: 'Select Root Variant (Only for Single Mode)'
        required: true
        type: choice
        default: 'KernelSU-Next'
        options:
          - 'KernelSU'
          - 'KernelSU-Next'
          - 'KernelSU-Next (All Managers)'
          - 'Rissu (MamboSU)'
          - 'ResukiSU'
          - 'Wild KSU'
          - 'Non-KSU'
      hook_method:
        description: 'Select Hook Method (Only for Single Mode - KSU Next, Rissu, Wild)'
        required: true
        type: choice
        default: 'susfs'
        options:
          - 'susfs'
          - 'kprobes'
      performance_patch:
        description: 'Select Device SoC for Performance Tuning'
        required: true
        type: choice
        default: 'Snapdragon'
        options:
          - 'Snapdragon'
          - 'MediaTek'
          - 'Universal'
      apply_perf_tweaks:
        description: 'Apply Performance Tweaks (qcom-cpufreq-hw)'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      apply_cam_fix:
        description: 'Apply Camera Fix (Infinix GT 20 Pro)'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      apply_xiaomi_compat_fix:
        description: 'Apply Xiaomi Compat Fix (DRM/Module)'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      apply_susfs_sublevel_fixes:
        description: 'Apply WildKSU SuSFS Sublevel Compilation Fixes'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      apply_bbg:
        description: 'Apply Baseband Guard (BBG) Security Module'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      apply_vtomsonek:
        description: 'Apply SND Audio Modules (vTomsonek variant)'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      apply_hakan:
        description: 'Apply WiFi/Bluetooth RFKILL modules (Hakan variant)'
        required: true
        type: choice
        default: 'No'
        options:
          - 'Yes'
          - 'No'
      clang_version:
        description: 'Select Clang Version'
        required: true
        type: choice
        options:
          - 'r536225 (Clang 19)'
          - 'r547379 (Clang 20)'
          - 'r584948b (Clang 22)'

permissions:
  contents: write

jobs:
  setup-matrix:
    name: Setup Matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.build_mode }}" == "All Variants (KSU, Next, Rissu, ResukiSU, Wild KSU, NonKSU)" ]; then
            echo "🚀 Mode: ALL VARIANTS BUILD (Priority: ResukiSU First)"
            echo 'matrix=[{"variant":"ResukiSU","hook":"susfs"},{"variant":"KernelSU","hook":"susfs"},{"variant":"KernelSU","hook":"kprobes"},{"variant":"KernelSU-Next","hook":"susfs"},{"variant":"KernelSU-Next","hook":"kprobes"},{"variant":"Rissu (MamboSU)","hook":"susfs"},{"variant":"Rissu (MamboSU)","hook":"kprobes"},{"variant":"Wild KSU","hook":"susfs"},{"variant":"Wild KSU","hook":"kprobes"},{"variant":"Non-KSU","hook":"none"}]' >> $GITHUB_OUTPUT
          else
            echo "🚀 Mode: SINGLE VARIANT BUILD"
            echo 'matrix=[{"variant":"${{ github.event.inputs.root_variant }}","hook":"${{ github.event.inputs.hook_method }}"}]' >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.variant }} (${{ matrix.hook }})
    runs-on: ubuntu-22.04
    needs: setup-matrix
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Free disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 12288
          swap-size-mb: 10240
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "titit"
          git config --global user.email "Kingfinik98@gmail.com"

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y git curl repo build-essential bc bison flex libssl-dev \
            libelf-dev python3 python3-pip unzip zip rsync libncurses-dev lld ccache

      - name: Init & Sync GKI
        run: |
          mkdir gki && cd gki
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10 --depth=1
          repo sync -c --no-tags --no-clone-bundle --optimized-fetch -j$(nproc --all)

      - name: Update kernel source for GKI 5.10
        run: |
          cd gki
          # Delete the synced google common source
          rm -rf common
          if [ "${{ github.event.inputs.kernel_source }}" == "MillenniumOSS" ]; then
            echo "🔧 Using MillenniumOSS Source (Shallow Clone)"
            git clone --depth=1 -b chihiro-rebase https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git common
          else
            echo "🔧 Using Rama Source (Shallow Clone)"
            git clone --depth=1 -b android12-5.10 https://github.com/ramabondanp/android_kernel_common-5.10.git common
          fi
          cd common
          rm -rf drivers/staging/kernelsu

      - name: Apply Infinix GT 20 Pro Camera Fix
        working-directory: gki/common
        run: |
          PERF="${{ github.event.inputs.performance_patch }}"
          if [ "${{ github.event.inputs.apply_cam_fix }}" == "Yes" ]; then
            if [ "$PERF" == "MediaTek" ] || [ "$PERF" == "Universal" ]; then
              echo "📸 Applying Infinix GT 20 Pro Camera Fix..."
              patch -p1 < $GITHUB_WORKSPACE/.github/patches/infinix_cam.patch || echo "Camera patch is embedded"
            else
              echo "⏭️ Skipping Camera Fix (Only for MediaTek/Universal)"
            fi
          else
            echo "⏭️ Extra Tweaks Disabled. Skipping Camera Fix."
          fi

      - name: Apply Performance Patch
        run: |
          if [ "${{ github.event.inputs.apply_perf_tweaks }}" == "Yes" ]; then
            echo "🚀 Applying Performance Patch for ${{ github.event.inputs.performance_patch }}"
            if [ "${{ github.event.inputs.performance_patch }}" == "Snapdragon" ]; then
              cd gki/common
              echo "🚀 [Snapdragon] Applying qcom-cpufreq-hw performance patch (Xiaomi Marble)"
              cp $GITHUB_WORKSPACE/.github/patches/qcom-cpufreq-hw.c drivers/cpufreq/qcom-cpufreq-hw.c
              echo "✅ [Snapdragon] Applied."
            elif [ "${{ github.event.inputs.performance_patch }}" == "MediaTek" ]; then
              echo "✅ [MediaTek] Config will be injected via defconfig."
            elif [ "${{ github.event.inputs.performance_patch }}" == "Universal" ]; then
              echo "✅ [Universal] Config will be injected via defconfig."
            fi
          else
            echo "⏭️ Extra Tweaks Disabled. Skipping Performance Patch."
          fi

      - name: Tweak build config
        run: |
          sed -i '2d' gki/common/build.config.gki

      - name: Determine Sublevel
        working-directory: gki/common
        run: |
          SUBLEVEL=$(make kernelversion | cut -d'.' -f3 | cut -d'-' -f1)
          echo "SUBLEVEL=$SUBLEVEL" >> $GITHUB_ENV
          SUSFS_VER=$(cat $GITHUB_WORKSPACE/.github/patches/susfs4ksu/gki-android12-5.10/include/linux/susfs.h | grep -E '^#define SUSFS_VERSION' | cut -d' ' -f3 | sed 's/"//g')
          echo "SUSFS_VERSION=$SUSFS_VER" >> $GITHUB_ENV

      - name: Apply SuSFS Sublevel Compilation Fixes
        if: ${{ github.event.inputs.apply_susfs_sublevel_fixes == 'Yes' }}
        uses: ./.github/actions/susfs-patches
        with:
          android_version: "android12"
          kernel_version: "5.10"
          os_patch_level: "2024-07"
          sublevel: ${{ env.SUBLEVEL }}

      - name: Apply Baseband Guard (BBG)
        if: ${{ github.event.inputs.apply_bbg == 'Yes' }}
        uses: ./.github/actions/bbg

      - name: Apply vTomsonek Audio Modules
        if: ${{ github.event.inputs.apply_vtomsonek == 'Yes' }}
        uses: ./.github/actions/vtomsonek
        with:
          android_version: "android12"
          kernel_version: "5.10"
          os_patch_level: "2024-07"
          sublevel: ${{ env.SUBLEVEL }}

      - name: Apply Hakan RFKILL Modules
        if: ${{ github.event.inputs.apply_hakan == 'Yes' }}
        uses: ./.github/actions/hakan

      - name: Setup Root Variant & Inject Configs
        id: setup_root
        working-directory: gki/common
        run: |
          ROOT_VARIANT="${{ matrix.variant }}"
          HOOK_METHOD="${{ matrix.hook }}"
          PERF="${{ github.event.inputs.performance_patch }}"
          DEFCONFIG="arch/arm64/configs/gki_defconfig"

          echo "🧩 Starting Setup for Variant: $ROOT_VARIANT | Hook: $HOOK_METHOD"

          if [ "$ROOT_VARIANT" == "KernelSU" ]; then
            for KSU_PATH in drivers/staging/kernelsu drivers/kernelsu KernelSU KernelSU-Next; do
              [ -d $KSU_PATH ] && rm -rf $KSU_PATH
            done
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            sed -i 's/$(error KSU requires Kprobes; enable it (defconfig))/# $(error KSU requires Kprobes; enable it (defconfig))/' drivers/kernelsu/Kbuild

            if [ "$HOOK_METHOD" = "susfs" ]; then
              susfs=$GITHUB_WORKSPACE/.github/patches/susfs4ksu/gki-android12-5.10
              cp -r $susfs/fs . && cp -r $susfs/include . && cp -r $susfs/50_add_susfs_in_gki-android12-5.10.patch .
              patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch
            fi

            echo "CONFIG_KSU=y" >> $DEFCONFIG
            echo "CONFIG_KPM=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
            echo "CONFIG_KSU_SYSCALL_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KPROBES=y" >> $DEFCONFIG
            echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
            echo "CONFIG_OVERLAY_FS=y" >> $DEFCONFIG

            if [ "$HOOK_METHOD" = "susfs" ]; then
              echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
              echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG
            else
              echo "CONFIG_KSU_SUSFS=n" >> $DEFCONFIG
              echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
              echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG
            fi

          elif [ "$ROOT_VARIANT" == "KernelSU-Next" ]; then
            for KSU_PATH in drivers/staging/kernelsu drivers/kernelsu KernelSU KernelSU-Next; do
              [ -d $KSU_PATH ] && rm -rf $KSU_PATH
            done
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            sed -i 's/$(error KSU requires Kprobes; enable it (defconfig))/# $(error KSU requires Kprobes; enable it (defconfig))/' drivers/kernelsu/Kbuild
            
            if [ "$HOOK_METHOD" = "susfs" ]; then
              susfs=$GITHUB_WORKSPACE/.github/patches/susfs4ksu/gki-android12-5.10
              cp -r $susfs/fs . && cp -r $susfs/include . && cp -r $susfs/50_add_susfs_in_gki-android12-5.10.patch .
              patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch
            fi

            echo "CONFIG_KSU=y" >> $DEFCONFIG
            echo "CONFIG_KPM=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
            echo "CONFIG_KSU_SYSCALL_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KPROBES=y" >> $DEFCONFIG
            echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
            echo "CONFIG_OVERLAY_FS=y" >> $DEFCONFIG
            
            if [ "$HOOK_METHOD" = "susfs" ]; then
              echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
              echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG
            else
              echo "CONFIG_KSU_SUSFS=n" >> $DEFCONFIG
              echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
              echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG
            fi

          elif [ "$ROOT_VARIANT" == "KernelSU-Next (All Managers)" ]; then
            for KSU_PATH in drivers/staging/kernelsu drivers/kernelsu KernelSU KernelSU-Next; do
              [ -d $KSU_PATH ] && rm -rf $KSU_PATH
            done
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            sed -i 's/$(error KSU requires Kprobes; enable it (defconfig))/# $(error KSU requires Kprobes; enable it (defconfig))/' drivers/kernelsu/Kbuild
            
            echo "🔧 Applying Patch for All Managers Support..."
            curl -LSs "https://raw.githubusercontent.com/Kingfinik98/gki-builder/refs/heads/6.x/kernel-patches/ksu/ksun-add-more-managers-support.patch" -o /tmp/ksun-add-more-managers-support.patch
            cd KernelSU-Next && patch -p1 < /tmp/ksun-add-more-managers-support.patch && cd ..
            echo "✅ All Managers Patch Applied"
            
            git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
            rm -rf sus/.git
            susfs=sus/kernel_patches
            cp -r $susfs/fs . && cp -r $susfs/include . && cp -r $susfs/50_add_susfs_in_gki-android12-5.10.patch .
            patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch

            echo "CONFIG_KSU=y" >> $DEFCONFIG
            echo "CONFIG_KPM=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
            echo "CONFIG_KSU_SYSCALL_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KPROBES=y" >> $DEFCONFIG
            echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
            echo "CONFIG_OVERLAY_FS=y" >> $DEFCONFIG
            
            echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG

          elif [ "$ROOT_VARIANT" == "Rissu (MamboSU)" ]; then
            for KSU_PATH in drivers/staging/kernelsu drivers/kernelsu KernelSU; do
              [ -d $KSU_PATH ] && rm -rf $KSU_PATH
            done
            
            if [ "$HOOK_METHOD" = "susfs" ]; then
               curl -LSs "https://raw.githubusercontent.com/RapliVx/KernelSU/refs/heads/susfs-mambo-master/kernel/setup.sh" | bash -s susfs-mambo-master
            else
               curl -LSs "https://raw.githubusercontent.com/RapliVx/KernelSU/refs/heads/susfs-mambo-master/kernel/setup.sh" | bash -s susfs-mambo-master
            fi
                       
            if [ "$HOOK_METHOD" = "susfs" ]; then
               git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
               rm -rf sus/.git
               susfs=sus/kernel_patches
               cp -r $susfs/fs . && cp -r $susfs/include . && cp -r $susfs/50_add_susfs_in_gki-android12-5.10.patch .
               patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch
            fi

            echo "CONFIG_KSU=y" >> $DEFCONFIG
            echo "CONFIG_KPM=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
            echo "CONFIG_KSU_SYSCALL_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KPROBES=y" >> $DEFCONFIG
            echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
            echo "CONFIG_OVERLAY_FS=y" >> $DEFCONFIG
            
            if [ "$HOOK_METHOD" = "susfs" ]; then
              echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=n" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=n" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
              echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG
            else
              echo "CONFIG_KSU_SUSFS=n" >> $DEFCONFIG
              echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
              echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG
            fi

          elif [ "$ROOT_VARIANT" == "ResukiSU" ]; then
            rm -rf drivers/staging/kernelsu
            curl -LSs "https://raw.githubusercontent.com/Kingfinik98/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
            rm -rf sus/.git
            susfs=sus/kernel_patches
            cp -r $susfs/fs . && cp -r $susfs/include . && cp -r $susfs/50_add_susfs_in_gki-android12-5.10.patch .
            patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch

            echo "CONFIG_KSU=y" >> $DEFCONFIG
            echo "CONFIG_KPM=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
            echo "CONFIG_KSU_SYSCALL_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KPROBES=y" >> $DEFCONFIG
            echo "CONFIG_HAVE_KPROBES=y" >> $DEFCONFIG
            echo "CONFIG_KRETPROBES=y" >> $DEFCONFIG
            echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
            echo "CONFIG_OVERLAY_FS=y" >> $DEFCONFIG

          elif [ "$ROOT_VARIANT" == "Wild KSU" ]; then
            for KSU_PATH in drivers/staging/kernelsu drivers/kernelsu KernelSU; do
              [ -d $KSU_PATH ] && rm -rf $KSU_PATH
            done
            echo "➡️ add Wild_KSU"
            curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s wild
            echo "✅ Wild_KSU added"
            sed -i 's/$(error KSU requires Kprobes; enable it (defconfig))/# $(error KSU requires Kprobes; enable it (defconfig))/' drivers/kernelsu/Kbuild
            
            if [ "$HOOK_METHOD" = "susfs" ]; then
              susfs=$GITHUB_WORKSPACE/.github/patches/susfs4ksu/gki-android12-5.10
              cp -r $susfs/fs . && cp -r $susfs/include . && cp -r $susfs/50_add_susfs_in_gki-android12-5.10.patch .
              patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch
              echo "[✓] SUSFS patched"
            fi

            echo "CONFIG_KSU=y" >> $DEFCONFIG
            echo "CONFIG_KPM=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
            echo "CONFIG_KSU_SYSCALL_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KPROBES=y" >> $DEFCONFIG
            echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
            echo "CONFIG_OVERLAY_FS=y" >> $DEFCONFIG
            
            if [ "$HOOK_METHOD" = "susfs" ]; then
              echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
              echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
              echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG
            else
              echo "CONFIG_KSU_SUSFS=n" >> $DEFCONFIG
              echo "CONFIG_KSU_MANUAL_HOOK=n" >> $DEFCONFIG
              echo "CONFIG_KSU_HAS_MANUAL_HOOK=n" >> $DEFCONFIG
            fi

          elif [ "$ROOT_VARIANT" == "Non-KSU" ]; then
            rm -rf drivers/staging/kernelsu drivers/kernelsu KernelSU KernelSU-Next
          fi


          echo "🏷️ Extracting KSU Version..."
          if [ -d "KernelSU-Next" ]; then
            cd KernelSU-Next
            KSU_VERSION_TAG=$(git describe --tags --always | sed 's/^v//')
            KSU_VERSION=$(expr $(git rev-list --count HEAD) "+" 10200)
            echo "Extracted KernelSU-Next Version: $KSU_VERSION_TAG ($KSU_VERSION)"
            cd ..
            sed -i "s|ccflags-y += -DKSU_VERSION=.*|ccflags-y += -DKSU_VERSION=${KSU_VERSION}|" drivers/kernelsu/Kbuild || true
          elif [ -d "KernelSU" ]; then
            cd KernelSU
            KSU_VERSION_TAG=$(git describe --tags --always | sed 's/^v//')
            KSU_VERSION=$(expr $(git rev-list --count HEAD) "+" 10200)
            echo "Extracted KernelSU Version: $KSU_VERSION_TAG ($KSU_VERSION)"
            cd ..
            sed -i "s|ccflags-y += -DKSU_VERSION=.*|ccflags-y += -DKSU_VERSION=${KSU_VERSION}|" drivers/kernelsu/Kbuild || true
          fi
          echo "🧹 Removing embedded git repositories..."
          find . -name ".git" -type d -prune -exec rm -rf {} +
          echo "✅ Setup & Config Injection Complete"

      - name: Fix SUSFS Uname Symbol Error
        working-directory: gki/common
        run: |
          if [ "${{ matrix.variant }}" == "KernelSU" ] || [ "${{ matrix.variant }}" == "KernelSU-Next" ] || [ "${{ matrix.variant }}" == "KernelSU-Next (All Managers)" ]; then
            echo "🛠️ Applying fix for undefined SUSFS symbols (KernelSU/KernelSU-Next)..."
            sed -i 's/#ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME/#if 0 \/\* CONFIG_KSU_SUSFS_SPOOF_UNAME Disabled to fix build \*\//' drivers/kernelsu/supercalls.c
            echo "✅ SUSFS symbol fix applied for KernelSU/KernelSU-Next."
          else 
            echo "⏭️ Skipping SUSFS fix (Not needed for ${{ matrix.variant }})"
          fi

      - name: Set version
        working-directory: gki/common
        run: |
          echo "" > scripts/setlocalversion
          chmod +x scripts/setlocalversion
          
          KERNEL_NAME_INPUT="${{ github.event.inputs.kernel_name }}"
          ROOT_VARIANT="${{ matrix.variant }}"
          HOOK_METHOD="${{ matrix.hook }}"
          PERF="${{ github.event.inputs.performance_patch }}"

          SUFFIX=""
          if [ -n "$KERNEL_NAME_INPUT" ]; then
            SUFFIX="-$KERNEL_NAME_INPUT"
          fi

          if [ "$ROOT_VARIANT" == "KernelSU" ]; then SUFFIX="$SUFFIX-KSU";
          elif [ "$ROOT_VARIANT" == "KernelSU-Next" ]; then SUFFIX="$SUFFIX-Next";
          elif [ "$ROOT_VARIANT" == "KernelSU-Next (All Managers)" ]; then SUFFIX="$SUFFIX-Next-AllMgr";
          elif [ "$ROOT_VARIANT" == "Rissu (MamboSU)" ]; then SUFFIX="$SUFFIX-Rissu";
          elif [ "$ROOT_VARIANT" == "ResukiSU" ]; then SUFFIX="$SUFFIX-ResukiSU";
          elif [ "$ROOT_VARIANT" == "Wild KSU" ]; then SUFFIX="$SUFFIX-Wild";
          elif [ "$ROOT_VARIANT" == "Non-KSU" ]; then SUFFIX="$SUFFIX-NonKSU";
          fi

          if [ "$ROOT_VARIANT" == "KernelSU" ] || [ "$ROOT_VARIANT" == "KernelSU-Next" ] || [ "$ROOT_VARIANT" == "KernelSU-Next (All Managers)" ] || [ "$ROOT_VARIANT" == "Rissu (MamboSU)" ] || [ "$ROOT_VARIANT" == "Wild KSU" ]; then
             if [ "$HOOK_METHOD" = "susfs" ]; then SUFFIX="$SUFFIX-SUS"; fi
          elif [ "$ROOT_VARIANT" == "ResukiSU" ]; then
             SUFFIX="$SUFFIX-SUS"
          fi

          if [ "$PERF" = "Snapdragon" ]; then SUFFIX="$SUFFIX-Qcom";
          elif [ "$PERF" = "MediaTek" ]; then SUFFIX="$SUFFIX-Mtk";
          elif [ "$PERF" = "Universal" ]; then SUFFIX="$SUFFIX-Univ";
          fi
          
          echo "Setting custom kernel name: $SUFFIX"
          if grep -q '^EXTRAVERSION *=' Makefile; then
            sed -i "s/^EXTRAVERSION *=.*/EXTRAVERSION = $SUFFIX/" Makefile
          else
            echo "EXTRAVERSION = $SUFFIX" >> Makefile
          fi

      - name: Setup Clang
        working-directory: gki
        run: |
          mkdir -p prebuilts-master/clang/host/linux-x86
          if [ "${{ github.event.inputs.clang_version }}" == "r536225 (Clang 19)" ]; then
            CLANG_VER="clang-r536225"
            CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main-kernel-2025/clang-r536225.tar.gz"
          elif [ "${{ github.event.inputs.clang_version }}" == "r547379 (Clang 20)" ]; then
            CLANG_VER="clang-r547379"
            CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/62cdcefa89e31af2d72c366e8b5ef8db84caea62/clang-r547379.tar.gz"
          elif [ "${{ github.event.inputs.clang_version }}" == "r584948b (Clang 22)" ]; then
            CLANG_VER="clang-r584948b"
            CLANG_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.1/LLVM-22.1.1-Linux-X64.tar.xz"
          fi
          echo "CLANG_VER=$CLANG_VER" >> $GITHUB_ENV

          mkdir -p prebuilts-master/clang/host/linux-x86
          cd prebuilts-master/clang/host/linux-x86
          
          mkdir -p $CLANG_VER
          echo "📥 Downloading Clang: $CLANG_URL"
          curl -L "${CLANG_URL}" -o clang-temp.tar.gz
          echo "📦 Extracting Clang..."
          tar -xzf clang-temp.tar.gz -C $CLANG_VER
          rm -f clang-temp.tar.gz
          
          rm -rf clang-r563880b
          ln -sf $CLANG_VER clang-r563880b

      - name: Commit changes
        working-directory: gki/common
        run: |
          git add .
          git commit -m "Final clean tree before build" || true

      - name: Compile
        working-directory: gki
        run: |
          LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

      - name: Setup Environment Variables for Packaging
        id: vars
        run: |
          ROOT_VARIANT="${{ matrix.variant }}"
          BASE_LINUX_VERSION=$(make -s kernelversion -C gki/common | tr -d '\n\r')
          echo "BASE_LINUX_VERSION=$BASE_LINUX_VERSION" >> $GITHUB_ENV
          LINUX_VERSION=$(make -s kernelversion -C gki/common | tr -d '\n\r')
          echo "LINUX_VERSION=$LINUX_VERSION" >> $GITHUB_ENV
          
          CUSTOM_KERNEL_NAME="${{ github.event.inputs.kernel_name }}"
          [ -z "$CUSTOM_KERNEL_NAME" ] && KERNEL_NAME="CoreShift" || KERNEL_NAME="$CUSTOM_KERNEL_NAME"
          echo "KERNEL_NAME=$KERNEL_NAME" >> $GITHUB_ENV

          if [ "$ROOT_VARIANT" == "KernelSU" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="KSU-SUS" || VARIANT="KSU-Kprobes"
          elif [ "$ROOT_VARIANT" == "KernelSU-Next" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="Next-SUS" || VARIANT="Next-Kprobes"
          elif [ "$ROOT_VARIANT" == "KernelSU-Next (All Managers)" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="Next-AllMgr-SUS" || VARIANT="Next-AllMgr-Kprobes"
          elif [ "$ROOT_VARIANT" == "Rissu (MamboSU)" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="Rissu-SUS" || VARIANT="Rissu-Kprobes"
          elif [ "$ROOT_VARIANT" == "Wild KSU" ]; then
             [ "${{ matrix.hook }}" == "susfs" ] && VARIANT="Wild-SUS" || VARIANT="Wild-Kprobes"
          elif [ "$ROOT_VARIANT" == "ResukiSU" ]; then
             VARIANT="ResukiSU"
          elif [ "$ROOT_VARIANT" == "Non-KSU" ]; then
             VARIANT="NonKSU"
          fi
          echo "VARIANT=$VARIANT" >> $GITHUB_ENV

          BUILD_DATE=$(date +"%Y%m%d")
          RELEASE="v${BUILD_DATE}"
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "AK3_DIR_NAME=AK3-${KERNEL_NAME}-${RELEASE}-${BASE_LINUX_VERSION}-${VARIANT}" >> $GITHUB_ENV
          echo "AK3_ZIP_NAME=AK3-${KERNEL_NAME}-${RELEASE}-${BASE_LINUX_VERSION}-${VARIANT}.zip" >> $GITHUB_ENV
          echo "KBUILD_BUILD_TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S %Z")" >> $GITHUB_ENV
          echo "COMPILER_STRING=${{ github.event.inputs.clang_version }}" >> $GITHUB_ENV
          
          SUSFS_VER="N/A"
          if [ "$ROOT_VARIANT" != "Non-KSU" ]; then
            SUSFS_VER=$(cat $GITHUB_WORKSPACE/.github/patches/susfs4ksu/gki-android12-5.10/include/linux/susfs.h | grep -E '^#define SUSFS_VERSION' | cut -d' ' -f3 | sed 's/"//g')
          fi
          echo "SUSFS_VERSION=$SUSFS_VER" >> $GITHUB_ENV

      - name: Package Kernel (AnyKernel3)
        run: |
          echo "🚀 Starting kernel packaging process..."
          ANYKERNEL_REPO="https://github.com/Kingfinik98/AnyKernel3"
          ANYKERNEL_BRANCH="master"
          KERNEL_IMAGE="$GITHUB_WORKSPACE/gki/out/android12-5.10/dist/Image"
          git clone -q --depth=1 $ANYKERNEL_REPO -b $ANYKERNEL_BRANCH anykernel
          
          KERNEL_STRING="${{ env.LINUX_VERSION }}"
          sed -i "s|kernel.string=.*|kernel.string=$KERNEL_STRING|g" anykernel/anykernel.sh

          cd anykernel
          echo "🗜️ Zipping anykernel..."
          cp "$KERNEL_IMAGE" .
          zip -r9 ../${{ env.AK3_ZIP_NAME }} ./*
          cd ..
          echo "✅ Zip file created: ${{ env.AK3_ZIP_NAME }}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AK3_DIR_NAME }}
          path: |
            anykernel/*
            !anykernel/*.zip

      - name: Send to Telegram (Single Mode)
        if: github.event.inputs.build_mode == 'Single Variant'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "🚀 Sending to Telegram (Single Mode)..."
          ZIP_FILE="${{ env.AK3_ZIP_NAME }}"
          
          ROOT_VARIANT="${{ matrix.variant }}"
          if [ "$ROOT_VARIANT" == "KernelSU" ]; then ROOT_NAME="KernelSU";
          elif [ "$ROOT_VARIANT" == "KernelSU-Next" ]; then ROOT_NAME="KernelSU-Next";
          elif [ "$ROOT_VARIANT" == "KernelSU-Next (All Managers)" ]; then ROOT_NAME="KernelSU-Next (All Managers)";
          elif [ "$ROOT_VARIANT" == "Rissu (MamboSU)" ]; then ROOT_NAME="MamboSU";
          elif [ "$ROOT_VARIANT" == "Wild KSU" ]; then ROOT_NAME="Wild KSU";
          elif [ "$ROOT_VARIANT" == "ResukiSU" ]; then ROOT_NAME="ResukiSU";
          else ROOT_NAME="Stock / No Root"; fi

          CAPTION="🐧 *Linux Version*: ${{ env.LINUX_VERSION }}
          📅 *Build Date*: ${{ env.KBUILD_BUILD_TIMESTAMP }}
          🛡️ *Root Method*: $ROOT_NAME
          SUS: ${{ env.SUSFS_VERSION }}
          🔰 *Compiler*: ${{ env.COMPILER_STRING }}
          ⚙️ *Performance*: ${{ github.event.inputs.performance_patch }}"

          curl -F "chat_id=$TG_CHAT_ID" \
               -F "document=@$ZIP_FILE" \
               -F "caption=$CAPTION" \
               -F "parse_mode=Markdown" \
               https://api.telegram.org/bot$TG_BOT_TOKEN/sendDocument
          
          echo "✅ Sent to Telegram successfully"

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.variant }}-${{ matrix.hook }}
          path: gki/out/android12-5.10/common/build.log
          if-no-files-found: warn
      - name: Cleanup Build Artifacts
        if: always()
        run: |
          echo "🧹 Freeing up disk space for cache compression..."
          rm -rf gki/out gki/common anykernel

  release-all:
    name: Release All Variants
    needs: build
    if: github.event.inputs.build_mode == 'All Variants (KSU, Next, Rissu, ResukiSU, Wild KSU, NonKSU)'
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Release Variables
        run: |
          DATE_STR=$(date +"%Y%m%d")
          VERSION_SUFFIX=""

          # Try to get version from inputs
          if [ -n "${{ github.event.inputs.kernel_version }}" ]; then
             VERSION_SUFFIX="-${{ github.event.inputs.kernel_version }}"
          elif [ "${{ github.workflow }}" == "CoreShift AIO Master Update" ]; then
             VERSION_SUFFIX="-5.10"
          elif [ "${{ github.workflow }}" == "CoreShift AIO 4.19 Update" ]; then
             VERSION_SUFFIX="-4.19"
          elif [ "${{ github.workflow }}" == "CoreShift AIO VorteXSU" ]; then
             VERSION_SUFFIX="-5.10-VorteXSU"
          fi

          echo "RELEASE_TAG=v${DATE_STR}${VERSION_SUFFIX}" >> $GITHUB_ENV
          echo "RELEASE_DATE=$(date +"%Y-%m-%d %H:%M:%S %Z")" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Artifacts for Release
        run: |
          cd artifacts
          for dir in */; do
            if [ -d "$dir" ]; then
              echo "🗜️ Zipping ${dir}..."
              cd "$dir"
              zip -r9 "../${dir%/}.zip" ./*
              cd ..
              rm -rf "$dir"
            fi
          done
          cd ..

      - name: Send to Telegram (All Variants)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "🚀 Sending All Variants to Telegram..."
          
          KERNEL_NAME="${{ github.event.inputs.kernel_name }}"
          [ -z "$KERNEL_NAME" ] && KERNEL_NAME="CoreShift"
          PERF_TUNE="${{ github.event.inputs.performance_patch }}"

          CAPTION="🐧 *CoreShift All-in-One Release*
          📅 *Build Date*: $(date +"%Y-%m-%d %H:%M:%S %Z")
          🛡️ *Variants*: ResukiSU, KernelSU-Next, Rissu, Wild KSU, Non-KSU
          ⚙️ *Performance Tuning*: $PERF_TUNE
          🔰 *Compiler*: ${{ github.event.inputs.clang_version }}"

          for file in artifacts/*.zip; do
            if [ -f "$file" ]; then
              echo "📤 Uploading $(basename $file)..."
              curl -F "chat_id=$TG_CHAT_ID" \
                   -F "document=@$file" \
                   -F "caption=$CAPTION" \
                   -F "parse_mode=Markdown" \
                   https://api.telegram.org/bot$TG_BOT_TOKEN/sendDocument
              echo "✅ Uploaded $(basename $file)"
            fi
          done
          
          echo "✅ All variants sent successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CoreShift Release ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*.zip
          body: |
            🐧 **CoreShift All-in-One Release**
            📅 **Build Date**: ${{ env.RELEASE_DATE }}
            🛡️ **Variants Included**: ResukiSU, KernelSU-Next, Rissu, Wild KSU, Non-KSU
            ⚙️ **Performance Tuning**: ${{ github.event.inputs.performance_patch }}
            🔰 **Compiler**: ${{ github.event.inputs.clang_version || 'Hermetic Bazel Clang' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
